# ═══════════════════════════════════════════════
#  application.properties  —  DEFAULT (local dev)
# ═══════════════════════════════════════════════

spring.profiles.active=dev

# Server
server.port=${PORT:8081}
spring.application.name=upi-offline-mesh

# H2 in-memory (dev only)
spring.datasource.url=jdbc:h2:mem:upimesh;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis (dev — local or disabled)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# JPA
spring.jpa.open-in-view=false

# Scheduling
spring.task.scheduling.enabled=true

# Logging
logging.level.com.upi.mesh=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ── Business config ──
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400
upi.mesh.max-amount=100000
upi.mesh.min-amount=1

# ── JWT ──
upi.jwt.secret=${JWT_SECRET:dev-secret-change-in-production-must-be-256-bits-long}
upi.jwt.expiry-ms=86400000

# ── Rate limiting ──
upi.ratelimit.bridge-requests-per-minute=60
upi.ratelimit.auth-requests-per-minute=10

# ── Actuator ──
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ═══════════════════════════════════════════════
#  application-prod.properties  —  PRODUCTION
#  Set environment variable: SPRING_PROFILES_ACTIVE=prod
# ═══════════════════════════════════════════════

# PostgreSQL (Railway / Render inject DATABASE_URL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 console DISABLED in prod
spring.h2.console.enabled=false

# Flyway runs migrations on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis (Upstash free tier works perfectly)
spring.data.redis.url=${REDIS_URL}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

# Actuator — only health endpoint public in prod
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.upi.mesh=INFO
logging.level.root=WARN

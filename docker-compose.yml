version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: upi-postgres
    environment:
      POSTGRES_DB: upimesh
      POSTGRES_USER: upi
      POSTGRES_PASSWORD: upipass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upi -d upimesh"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (idempotency cache) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: upi-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Spring Boot App ──────────────────────────────────────────
  app:
    build: .
    container_name: upi-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/upimesh
      DB_USER: upi
      DB_PASSWORD: upipass123
      REDIS_URL: redis://redis:6379
      REDIS_SSL: "false"
      JWT_SECRET: "local-docker-secret-change-in-production-must-be-256-bits"
      PORT: 8081
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

volumes:
  pgdata:
  redisdata:
